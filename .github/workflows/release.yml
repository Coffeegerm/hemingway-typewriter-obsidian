name: Release Obsidian Plugin

on:
  # One-click release from the GitHub Actions UI: pick patch / minor / major.
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  # Or release automatically when a version tag is pushed (e.g. from `npm version`).
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: npm ci

      - name: Bump version, commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "${{ github.event.inputs.version_type }}"
          git push --follow-tags origin "HEAD:${{ github.ref_name }}"

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" \
            --title "${{ steps.vars.outputs.tag }}" \
            --generate-notes \
            main.js manifest.json styles.css
